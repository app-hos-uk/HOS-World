name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch: # Re-run after adding RAILWAY_TOKEN in repo Settings → Secrets

jobs:
  # Without this secret, deploy steps were skipped while the workflow still showed "success".
  verify-railway-token:
    name: Verify RAILWAY_TOKEN secret
    runs-on: ubuntu-latest
    steps:
      - name: Require GitHub secret RAILWAY_TOKEN
        env:
          T: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$T" ]; then
            echo "::error::Repository secret RAILWAY_TOKEN is missing. Deploy jobs were being skipped."
            echo "1. Log in to Railway as the account that owns the project (e.g. app@houseofspells.co.uk)"
            echo "2. Create a token: https://railway.app/account/tokens"
            echo "3. Add it: GitHub repo → Settings → Secrets and variables → Actions → New repository secret → name RAILWAY_TOKEN"
            echo "   Or CLI: gh secret set RAILWAY_TOKEN -R app-hos-uk/HOS-World -b\"<paste-token>\""
            exit 1
          fi
          echo "RAILWAY_TOKEN is set."

  deploy-api:
    name: Deploy API to Railway
    needs: [verify-railway-token]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Use current Railway CLI — third-party docker action bundled CLI ~3.11 and returned "Unauthorized" with project tokens
      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest
      - name: Deploy API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service api \
            --project 4d88db31-8b7c-4eb3-bd17-352f69c5a66f \
            --environment production \
            --detach \
            --ci

  deploy-web:
    name: Deploy Web to Railway
    needs: [verify-railway-token]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest
      - name: Deploy Web
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service web \
            --project 4d88db31-8b7c-4eb3-bd17-352f69c5a66f \
            --environment production \
            --detach \
            --ci

  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    if: success()
    steps:
      - name: Wait for deployment propagation
        run: sleep 30
      - name: API health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://hos-marketplaceapi-production.up.railway.app/api/health || echo "000")
          echo "API health check status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "201" ]; then
            echo "::warning::API health check returned $STATUS"
          fi
      - name: Web health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://hos-marketplaceweb-production.up.railway.app/ || echo "000")
          echo "Web health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Web health check returned $STATUS"
          fi
