name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: 'postgresql://test:test@localhost:5432/test'
      JWT_SECRET: 'test-secret-minimum-32-chars-long-for-ci'
      JWT_REFRESH_SECRET: 'test-refresh-secret-minimum-32-chars-for-ci'
      NEXT_PUBLIC_API_URL: 'http://localhost:3001/api'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Generate Prisma client
        run: cd services/api && npx prisma generate

      - name: Build shared packages
        run: |
          pnpm --filter @hos-marketplace/shared-types build || true
          pnpm --filter @hos-marketplace/events build || true
          pnpm --filter @hos-marketplace/utils build || true
          pnpm --filter @hos-marketplace/theme-system build || true
          pnpm --filter @hos-marketplace/cms-client build || true
          pnpm --filter @hos-marketplace/api-client build

      - name: Type check API & Web (parallel)
        run: |
          cd services/api && npx tsc --noEmit &
          PID_API=$!
          cd apps/web && npx tsc --noEmit &
          PID_WEB=$!
          wait $PID_API || exit 1
          wait $PID_WEB || exit 1

      - name: Run API tests with coverage
        run: cd services/api && npx jest --coverage --coverageReporters=text --coverageReporters=json-summary

      - name: Check coverage threshold
        run: |
          COVERAGE_FILE="services/api/coverage/coverage-summary.json"
          if [ ! -f "$COVERAGE_FILE" ]; then
            echo "::error::Coverage report not found"
            exit 1
          fi
          LINES=$(node -e "const c=require('./$COVERAGE_FILE');console.log(c.total.lines.pct)")
          echo "Line coverage: ${LINES}%"
          THRESHOLD=40
          PASS=$(node -e "console.log(Number($LINES)>=$THRESHOLD?'yes':'no')")
          if [ "$PASS" != "yes" ]; then
            echo "::error::Line coverage ${LINES}% is below threshold ${THRESHOLD}%"
            exit 1
          fi

      - name: Build API & Web (parallel)
        run: |
          cd services/api && pnpm build &
          PID_API=$!
          cd apps/web && pnpm build &
          PID_WEB=$!
          wait $PID_API || exit 1
          wait $PID_WEB || exit 1
