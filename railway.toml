[build]
builder = "DOCKERFILE"

[deploy]
# Run migrations before the new container starts so /api/health/live responds quickly.
preDeployCommand = "./docker-migrate.sh"
startCommand = "node dist/main.js"
# Liveness only: fast 200 once HTTP is up (no DB/Meili). Full dependency status remains at /api/health.
healthcheckPath = "/api/health/live"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
